
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Nuevo mensaje de WhatsApp</title>
  <style type="text/css">
  body {margin: 0; padding: 0; min-width: 100%!important;}
  img {height: auto;}
  .content {width: 100%; max-width: 600px;}
  .header {padding: 40px 30px 20px 30px;}
  .innerpadding {padding: 50px 30px 50px 30px;}
  .borderbottom {border-bottom: 1px solid #f2eeed;}
  .subhead {font-size: 15px; color: #ffffff; font-family: sans-serif; letter-spacing: 10px;}
  .h1, .h2, .bodycopy {color: #153643; font-family: sans-serif;}
  .h1 {font-size: 33px; line-height: 38px; font-weight: bold;}
  .h2 {padding: 0 0 15px 0; font-size: 24px; line-height: 28px; font-weight: bold;}
  .bodycopy {font-size: 16px; line-height: 22px;}
  .button {text-align: center; font-size: 18px; font-family: sans-serif; font-weight: bold; padding: 20px 30px;}
  .button a {color: #ffffff; text-decoration: none; background-color: #25d366; padding: 12px 24px; border-radius: 4px; display: inline-block;}
  .meta {font-size: 13px; color: #888888; font-family: sans-serif; padding: 4px 0;}
  .bubble {background: #f0f4f8; border-left: 4px solid #25d366; padding: 16px 20px; margin: 16px 0; font-family: sans-serif; font-size: 16px; color: #153643; line-height: 1.5; border-radius: 4px;}
  .footer {padding: 20px 30px 15px 30px;}
  .footercopy {font-family: sans-serif; font-size: 14px; color: #ffffff;}
  .footercopy a {color: #ffffff; text-decoration: underline;}
  </style>
</head>

<body yahoo bgcolor="#edf2f7">
  <table width="100%" bgcolor="#edf2f7" border="0" cellpadding="0" cellspacing="0">
    <tr>
      <td>
        <table bgcolor="#ffffff" class="content" align="center" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td bgcolor="#25d366" class="header">
              <table border="0" cellpadding="0" cellspacing="0" style="width: 100%;">
                <tr>
                  <td style="padding: 0 20px 20px 0; text-align: center;">
                    <img class="fix" src="https://chalan-public.s3.amazonaws.com/logo_chalan.png" width="40%" border="0" alt="Chalán" />
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td class="innerpadding borderbottom">
              <table width="100%" border="0" cellspacing="0" cellpadding="0">
                <tr>
                  <td class="h2">Nuevo mensaje de WhatsApp</td>
                </tr>
                <tr>
                  <td class="meta">De: <strong>{{ profile_name or from_number }}</strong></td>
                </tr>
                <tr>
                  <td class="meta">Número: {{ from_number }}</td>
                </tr>
                <tr>
                  <td class="meta">Recibido: {{ created_at.strftime('%d/%m/%Y %H:%M') if created_at else '' }}</td>
                </tr>
                <tr>
                  <td>
                    <div class="bubble">{{ body or '(sin texto)' }}</div>
                  </td>
                </tr>
                <tr>
                  <td class="button">
                    <a href="{{ backoffice_url }}">Ver conversación en backoffice</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td class="footer" bgcolor="#44525f">
              <table width="100%" border="0" cellspacing="0" cellpadding="0">
                <tr>
                  <td align="center" class="footercopy">
                    &reg; <a href="{{ site_url }}">Chalan</a>, {{ printable_country }} {{ current_year }}<br/>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
