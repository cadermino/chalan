# Define the parameters for a specific virtual host/server
server {
    listen 8000;
    server_name chalan.pe;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
   # Define the directory where the contents being requested are stored
   # root /chalan/frontend/dist;
 
   # Define the default page that will be served If no page was requested
   # (ie. if www.kennedyfamilyrecipes.com is requested)
   # index index.html;
 
   # Define the server name, IP address, and/or port of the server
   listen 443 ssl;
   # server_name xxx.yyy.zzz.aaa
   server_name chalan.pe;
   server_tokens off;
    
   ssl_certificate /etc/letsencrypt/live/chalan.pe/fullchain.pem;
   ssl_certificate_key /etc/letsencrypt/live/chalan.pe/privkey.pem;
   include /etc/letsencrypt/options-ssl-nginx.conf;
   ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
   
   # Define the specified charset to the “Content-Type” response header field
   charset utf-8;
   # Vue app routes
   location @vue {
       root /chalan/frontend/dist;
       rewrite ^.*$ /index.html break;
   }

   location /order {
       root /chalan/frontend/dist;
       index index.html;
       try_files $uri $uri/ @vue;
   }

   location /carrier-company {
       root /chalan/frontend/dist;
       index index.html;
       try_files $uri $uri/ @vue;
   }

   location /dashboard {
       root /chalan/frontend/dist;
       index index.html;
       try_files $uri $uri/ @vue;
   }

   location /register-login {
       root /chalan/frontend/dist;
       index index.html;
       try_files $uri $uri/ @vue;
   }

   location /quotation {
       root /chalan/frontend/dist;
       index index.html;
       try_files $uri $uri/ @vue;
   }

   # Vue static assets (js, css, img built by webpack)
   location /js {
       root /chalan/frontend/dist;
   }

   location /css {
       root /chalan/frontend/dist;
   }

   location /img {
       root /chalan/frontend/dist;
   }

   location /favicon.ico {
       root /chalan/frontend/dist;
   }

   # Next.js static assets
   location /_next {
       proxy_pass http://127.0.0.1:3000;
       proxy_http_version 1.1;
       proxy_set_header Host $host;
   }

   # Flask API
   location /api {
       proxy_pass http://127.0.0.1:8001;
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       client_max_body_size 5M;
   }

   # Everything else goes to Next.js
   location / {
       proxy_pass http://127.0.0.1:3000;
       proxy_http_version 1.1;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Connection 'upgrade';
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       proxy_set_header X-Forwarded-Proto $scheme;
       proxy_cache_bypass $http_upgrade;
   }
}