services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx.peru.prod
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    ports:
      - 80:80
      - 443:443
    restart: always
    depends_on:
      - web
      - backoffice-api
    command: sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"
  web:
    build:
      context: .
      dockerfile: Dockerfile.peru.prod
      args:
        NEXT_PUBLIC_PLACES_API_KEY: ${NEXT_PUBLIC_PLACES_API_KEY}
    env_file: .env.prod
    restart: always
    command: sh -c "cd /chalan/frontend-react-standalone && HOSTNAME=0.0.0.0 node server.js & gunicorn -b 0.0.0.0:8001 --access-logfile - --error-logfile - chalan:app"
  backoffice-api:
    build:
      context: .
      dockerfile: Dockerfile.backoffice-api.prod
    env_file: .env.backoffice.prod
    restart: always
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;"
