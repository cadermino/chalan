proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=STATIC:10m inactive=7d use_temp_path=off;

upstream vuex_upstream {
  server vuex:8080;
}

upstream flask_upstream {
  server flask:8001;
}

upstream nextjs_upstream {
  server nextjs:3000;
}

server {
   listen 8000;

   server_name local.chalan.mx;
   server_tokens off;
   gzip on;
   gzip_proxied any;
   gzip_comp_level 4;
   gzip_types text/css application/javascript image/svg+xml;

   proxy_http_version 1.1;
   proxy_set_header Upgrade $http_upgrade;
   proxy_set_header Connection 'upgrade';
   proxy_set_header Host $host;
   proxy_cache_bypass $http_upgrade;
   # Define the specified charset to the “Content-Type” response header field
   charset utf-8;

   # Vue app routes
   location /order {
       proxy_pass http://vuex_upstream;
   }

   location /carrier-company {
       proxy_pass http://vuex_upstream;
   }

   location /dashboard {
       proxy_pass http://vuex_upstream;
   }

   location /register-login {
       proxy_pass http://vuex_upstream;
   }

   location /quotation {
       proxy_pass http://vuex_upstream;
   }

   # Vue static assets (js, css, img built by webpack)
   location /js {
       proxy_pass http://vuex_upstream;
   }

   location /css {
       proxy_pass http://vuex_upstream;
   }

   location /img {
       proxy_pass http://vuex_upstream;
   }

   location /favicon.ico {
       proxy_pass http://vuex_upstream;
   }

   # Next.js static assets
   location /_next {
       proxy_pass http://nextjs_upstream;
       proxy_http_version 1.1;
       proxy_set_header Host $host;
   }

   # Flask API
   location /api {
       proxy_pass http://flask_upstream;
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       client_max_body_size 5M;
   }

   # Everything else goes to Next.js
   location / {
       proxy_pass http://nextjs_upstream;
       proxy_http_version 1.1;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Connection 'upgrade';
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       proxy_cache_bypass $http_upgrade;
   }
}